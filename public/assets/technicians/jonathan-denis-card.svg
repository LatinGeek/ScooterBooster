<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Jonathan Denis technician banner</title>
  <desc id="desc">Dark tech-style profile banner with the name Jonathan Denis, service list, contact phone, and QR placeholder.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="45%" stop-color="#07111f" />
      <stop offset="100%" stop-color="#030712" />
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0" />
      <stop offset="45%" stop-color="#38bdf8" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.95" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#1d4ed8" stroke-opacity="0.14" stroke-width="1.2" />
      <circle cx="4" cy="4" r="1.8" fill="#60a5fa" fill-opacity="0.16" />
    </pattern>
    <pattern id="qr" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#fff" />
      <rect x="0" y="0" width="40" height="40" fill="none" stroke="#111827" stroke-opacity="0.08" />
      <rect x="4" y="4" width="6" height="6" fill="#111827" />
      <rect x="10" y="10" width="4" height="4" fill="#111827" />
      <rect x="20" y="6" width="5" height="5" fill="#111827" />
      <rect x="28" y="14" width="4" height="4" fill="#111827" />
      <rect x="6" y="22" width="4" height="4" fill="#111827" />
      <rect x="16" y="18" width="6" height="6" fill="#111827" />
      <rect x="28" y="28" width="6" height="6" fill="#111827" />
      <rect x="2" y="30" width="4" height="4" fill="#111827" />
      <rect x="12" y="30" width="4" height="4" fill="#111827" />
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#grid)" />

  <g opacity="0.7">
    <path d="M0 130 H240 L310 60 H515" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6" />
    <path d="M1120 92 H1360 L1440 22 H1600" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.55" />
    <path d="M0 785 H180 L260 745 H520" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6" />
    <path d="M1090 800 H1320 L1410 740 H1600" stroke="#f97316" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.55" />
    <path d="M190 0 V120 L260 190 H370" stroke="#2563eb" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.3" />
    <path d="M1510 0 V120 L1450 190 H1340" stroke="#2563eb" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.3" />
  </g>

  <g filter="url(#glow)" opacity="0.9">
    <circle cx="128" cy="110" r="7" fill="#38bdf8" />
    <circle cx="210" cy="168" r="5" fill="#60a5fa" />
    <circle cx="1416" cy="94" r="7" fill="#38bdf8" />
    <circle cx="1508" cy="156" r="5" fill="#60a5fa" />
    <circle cx="132" cy="772" r="7" fill="#60a5fa" />
    <circle cx="232" cy="730" r="5" fill="#38bdf8" />
    <circle cx="1448" cy="764" r="7" fill="#f97316" />
    <circle cx="1524" cy="706" r="5" fill="#fb7185" />
  </g>

  <g transform="translate(800 250)" filter="url(#glow)">
    <path d="M0 -130 L112 -18 L0 94 L-112 -18 Z" fill="none" stroke="#60a5fa" stroke-width="12" stroke-linejoin="round" opacity="0.92" />
    <path d="M-70 -15 H-20 V-68 L0 -88 L20 -68 V-15 H70 V15 H20 V68 L0 88 L-20 68 V15 H-70 Z" fill="none" stroke="#60a5fa" stroke-width="10" stroke-linejoin="round" opacity="0.65" />
  </g>

  <g transform="translate(800 190)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="88" font-weight="900" letter-spacing="3" fill="#dbeafe" stroke="#94a3b8" stroke-width="2">
      PROYECTIVE
    </text>
    <path d="M-104 -14 L-86 -48 L-68 -14 L-50 -48 L-32 -14" stroke="#f97316" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>

  <rect x="330" y="392" width="940" height="2" fill="url(#line)" opacity="0.7" />

  <text x="800" y="530" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="800" fill="#ffffff">
    Jonathan Denis
  </text>

  <text x="800" y="610" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#e5e7eb">
    Reparaciones • Mantenimientos • Repuestos
  </text>
  <text x="800" y="675" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#e5e7eb">
    Reprogramaciones • Electricidad
  </text>
  <text x="800" y="740" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#e5e7eb">
    Electronica vehicular
  </text>

  <g transform="translate(410 820)">
    <circle cx="0" cy="0" r="34" fill="none" stroke="#38bdf8" stroke-width="6" />
    <path d="M-13 -2 C-9 -18, 13 -14, 13 0 C13 14, -1 22, -13 30 C-26 21, -37 8, -35 -6 C-33 -21, -18 -27, -13 -2 Z" fill="#22c55e" opacity="0.85" />
    <text x="68" y="18" font-family="Arial, Helvetica, sans-serif" font-size="66" font-weight="700" fill="#ffffff" letter-spacing="1">
      097301317
    </text>
  </g>

  <g transform="translate(1230 605)">
    <rect x="0" y="0" width="260" height="260" rx="20" fill="#ffffff" />
    <rect x="18" y="18" width="224" height="224" rx="12" fill="url(#qr)" />
    <rect x="0" y="0" width="260" height="260" rx="20" fill="none" stroke="#e5e7eb" stroke-width="4" />
    <text x="130" y="302" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800" fill="#111827">
      PROYECTVEUY
    </text>
  </g>
</svg>
